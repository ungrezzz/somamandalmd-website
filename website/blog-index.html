  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAF8F6;
      color: #333;
      line-height: 1.6;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header-container {
      max-width: 1200px; margin: 0 auto;
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-headshot {
      width: 40px; height: 40px; border-radius: 50%;
      background: #FFF5F7; overflow: hidden; flex-shrink: 0;
    }
    .header-headshot img { width: 100%; height: 100%; object-fit: cover; }
    .header-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; color: #333;
    }
    .header-home-link {
      display: flex; align-items: center; gap: 1rem;
      text-decoration: none; color: inherit;
    }
    .header-home-link:hover .header-text { color: #E75294; }
    .header-back {
      color: #E75294; text-decoration: none;
      font-size: 0.9rem; margin-left: 0.5rem;
    }
    .header-back:hover { text-decoration: underline; }
    .header-logo img { height: 45px; width: auto; }

    /* ===== HERO ===== */
    .blog-hero {
      background: linear-gradient(160deg, #1a1a1a 0%, #2d1f28 50%, #4a2039 100%);
      padding: 4.5rem 2rem 4rem;
      text-align: center; position: relative; overflow: hidden;
    }
    .blog-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 80%, rgba(231,82,148,0.15), transparent 60%),
                  radial-gradient(ellipse at 70% 20%, rgba(231,82,148,0.08), transparent 50%);
      pointer-events: none;
    }
    .blog-hero-content { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }
    .blog-hero-label {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: #E75294; margin-bottom: 1rem;
      padding: 0.4rem 1rem;
      border: 1px solid rgba(231,82,148,0.3); border-radius: 20px;
    }
    .blog-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem; color: #fff;
      margin-bottom: 1.2rem; line-height: 1.15;
    }
    .blog-hero h1 .accent { color: #E75294; }
    .blog-hero p {
      font-size: 1.05rem; color: rgba(255,255,255,0.7);
      max-width: 520px; margin: 0 auto; line-height: 1.7;
    }
    .blog-hero-rule {
      width: 50px; height: 2px; background: #E75294;
      margin: 1.5rem auto 0; border: none; border-radius: 1px;
    }

    /* ===== TABLE OF CONTENTS ===== */
    .toc-section {
      max-width: 900px; margin: 0 auto;
      padding: 2rem 2rem 1.5rem;
    }
    .toc-header {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
    }
    .toc-header svg { width: 16px; height: 16px; color: #E75294; flex-shrink: 0; }
    .toc-header span {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: #999;
    }
    .toc-list { display: flex; flex-wrap: wrap; gap: 0; list-style: none; }
    .toc-list li { position: relative; }
    .toc-list li:not(:last-child)::after { content: '·'; color: #ccc; padding: 0 0.5rem; font-weight: 700; }
    .toc-link {
      color: #666; text-decoration: none;
      font-size: 0.88rem; transition: color 0.2s; line-height: 2;
    }
    .toc-link:hover { color: #E75294; }
    .toc-divider { max-width: 900px; margin: 0 auto; border: none; border-top: 1px solid #eee; }

    /* ===== ARTICLE CARDS ===== */
    main { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    .article-card {
      background: #fff; border-radius: 12px;
      margin-bottom: 2.5rem; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex; flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    }
    .card-link {
      display: block; text-decoration: none; color: inherit; cursor: pointer;
    }
    .card-image {
      height: 260px; overflow: hidden; flex-shrink: 0;
    }
    .card-image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s;
    }
    .article-card:hover .card-image img { transform: scale(1.03); }
    .card-body { padding: 2rem 2.5rem 2.5rem; }
    .card-date {
      font-size: 0.75rem; color: #bbb; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 0.6rem;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: #222; margin-bottom: 0.75rem; line-height: 1.25;
    }
    .card-excerpt { font-size: 0.97rem; color: #666; line-height: 1.7; margin-bottom: 1.5rem; }
    .card-read-more {
      display: inline-block;
      background: #E75294; color: #fff;
      text-decoration: none; font-size: 0.875rem; font-weight: 600;
      padding: 0.55rem 1.5rem; border-radius: 50px;
      transition: background 0.2s, transform 0.2s;
    }
    .card-read-more:hover { background: #c9347a; transform: translateY(-1px); }

    /* ===== FEATURED ARTICLE (first card) ===== */
    .article-card.featured .card-image { height: 340px; }
    .article-card.featured .card-title { font-size: 2rem; }
    .featured-badge {
      display: inline-block;
      background: #FFF0F6; color: #E75294;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.25rem 0.7rem;
      border-radius: 20px; border: 1px solid #fcc; margin-bottom: 0.75rem;
    }

    /* ===== FOOTER ===== */
    footer {
      background: #333; color: #fff;
      padding: 2rem; text-align: center; font-size: 0.85rem;
    }
    footer a { color: #E75294; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .blog-hero h1 { font-size: 2rem; }
      .article-card.featured .card-image { height: 220px; }
      .card-body { padding: 1.5rem; }
      .header-container { padding: 1rem; }
      main { padding: 1.5rem 1rem 3rem; }
      .toc-section { padding: 1.5rem 1rem 1rem; }
    }

<body>

  <!-- ===== STICKY HEADER ===== -->
  <header>
    <div class="header-container">
      <div class="header-left">
        <a href="/" class="header-home-link">
          <div class="header-headshot">
            <img src="assets/images/headshots/head-shot -- round.png" alt="Dr. Soma Mandal">
          </div>
          <span class="header-text">Dr. Soma Mandal</span>
        </a>
        <a href="/" class="header-back">← Back to Home</a>
      </div>
      <div class="header-logo">
        <img src="assets/logos/logo-primary.png" alt="Dr. Soma Mandal Logo">
      </div>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="blog-hero">
    <div class="blog-hero-content">
      <span class="blog-hero-label">Evidence-Based Guidance</span>
      <h1>The <span class="accent">Menopause</span> Blog</h1>
      <p>Warm, practical insights for women navigating perimenopause, menopause, and the vibrant years beyond &mdash; from a doctor who truly understands.</p>
      <hr class="blog-hero-rule">
    </div>
  </section>

  <!-- ===== TABLE OF CONTENTS (dynamic) ===== -->
  <nav class="toc-section" id="toc-section">
    <div class="toc-header">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
      <span>In this issue</span>
    </div>
    <ul class="toc-list" id="toc-list">
      <!-- Populated by JS -->
    </ul>
  </nav>
  <hr class="toc-divider">

  <!-- ===== ARTICLE CARDS (dynamic) ===== -->
  <main id="articles-main">
    <!-- Populated by JS -->
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2026 Dr. Soma Mandal, MD &nbsp;|&nbsp; <a href="/">Back to Home</a></p>
  </footer>

  <script>
    (async function() {
      let articles;
      try {
        const res = await fetch('data/articles.json');
        articles = await res.json();
      } catch(e) {
        document.getElementById('articles-main').innerHTML = '<p style="padding:2rem;color:#c00">Could not load articles.</p>';
        return;
      }

      // articles.json is already sorted newest-first
      const tocList = document.getElementById('toc-list');
      const main = document.getElementById('articles-main');

      articles.forEach(function(article, i) {
        // TOC entry
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '/blog/' + article.slug;
        a.className = 'toc-link';
        a.textContent = article.toc || article.title;
        li.appendChild(a);
        tocList.appendChild(li);

        // Format date
        const d = new Date(article.date + 'T12:00:00');
        const dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        // Article card
        const card = document.createElement('article');
        card.className = 'article-card' + (i === 0 ? ' featured' : '');

        const badgeHTML = i === 0 ? '<span class="featured-badge">Latest Article</span>' : '';

        var articleUrl = '/blog/' + article.slug;

        card.innerHTML =
          '<a href="' + articleUrl + '" class="card-link">' +
            '<div class="card-image">' +
              '<img src="/' + article.image + '" alt="' + escapeAttr(article.imageAlt || article.title) + '" loading="' + (i === 0 ? 'eager' : 'lazy') + '">' +
            '</div>' +
            '<div class="card-body">' +
              badgeHTML +
              '<p class="card-date">' + dateStr + '</p>' +
              '<h2 class="card-title">' + escapeHTML(article.title) + '</h2>' +
              '<p class="card-excerpt">' + escapeHTML(article.excerpt) + '</p>' +
              '<span class="card-read-more">Read Article &rarr;</span>' +
            '</div>' +
          '</a>';

        main.appendChild(card);
      });
    })();

    function escapeHTML(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escapeAttr(s) {
      return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>

</body>
