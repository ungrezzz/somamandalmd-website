<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title/meta filled dynamically -->
  <title id="page-title">Loading… &mdash; Dr. Soma Mandal, MD</title>
  <meta name="description" id="meta-description" content="">
  <meta property="og:title" id="og-title" content="">
  <meta property="og:description" id="og-description" content="">
  <meta property="og:type" content="article">
  <meta property="og:image" id="og-image" content="">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" id="canonical" href="https://www.somamandalmd.com/blog">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/logos/favicon96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/logos/favicon180x180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #FAF8F6;
      color: #333;
      line-height: 1.7;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky; top: 0; z-index: 100;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header-container {
      max-width: 900px; margin: 0 auto;
      padding: 0.9rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-headshot {
      width: 38px; height: 38px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0; background: #FFF5F7;
    }
    .header-headshot img { width: 100%; height: 100%; object-fit: cover; }
    .header-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700; color: #333;
    }
    .header-home-link {
      display: flex; align-items: center; gap: 0.75rem;
      text-decoration: none; color: inherit;
    }
    .header-home-link:hover .header-name { color: #E75294; }
    .header-back {
      color: #E75294; text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      transition: opacity 0.2s;
    }
    .header-back:hover { opacity: 0.75; }

    /* ===== ARTICLE HERO ===== */
    .article-hero {
      width: 100%;
      max-height: 420px;
      overflow: hidden;
    }
    .article-hero img {
      width: 100%; height: 420px;
      object-fit: cover; display: block;
    }

    /* ===== ARTICLE BODY ===== */
    .article-wrapper {
      max-width: 740px; margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }
    .article-date {
      font-size: 0.8rem; color: #999; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 0.75rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; line-height: 1.2;
      color: #1a1a1a; margin-bottom: 0.75rem;
    }
    .article-meta {
      font-size: 0.9rem; color: #999; margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #eee;
    }
    .article-body p {
      font-size: 1.05rem; color: #444;
      margin-bottom: 1.4rem; line-height: 1.8;
    }
    .article-body p strong { color: #222; }

    /* ===== SHARE BUTTONS ===== */
    .share-bar {
      display: flex; align-items: center; gap: 0.75rem;
      margin-top: 2.5rem; padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }
    .share-label {
      font-size: 0.8rem; font-weight: 600; color: #999;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .share-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: #f0f0f0; color: #555;
      text-decoration: none; transition: background 0.2s, color 0.2s;
    }
    .share-btn:hover { background: #E75294; color: #fff; }
    .share-btn svg { width: 16px; height: 16px; }

    /* ===== NAV BETWEEN ARTICLES ===== */
    .article-nav {
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; margin-top: 3rem; padding-top: 2rem;
      border-top: 1px solid #eee;
      flex-wrap: wrap;
    }
    .article-nav a {
      color: #E75294; text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      transition: opacity 0.2s;
      max-width: 45%;
    }
    .article-nav a:hover { opacity: 0.75; }
    .article-nav a.prev::before { content: "← "; }
    .article-nav a.next::after { content: " →"; }
    .article-nav a.all { color: #888; max-width: none; }

    /* ===== FOOTER ===== */
    footer {
      background: #1a1a1a; color: #aaa;
      text-align: center; padding: 2rem;
      font-size: 0.85rem;
    }
    footer a { color: #E75294; text-decoration: none; }

    /* ===== LOADING / ERROR ===== */
    .loading {
      max-width: 740px; margin: 6rem auto;
      padding: 2rem; text-align: center; color: #999;
    }

    @media (max-width: 600px) {
      .article-wrapper { padding: 2rem 1.25rem 4rem; }
      .header-name { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="header-left">
        <a href="/" class="header-home-link">
          <div class="header-headshot">
            <img src="/assets/images/headshots/head-shot-round.png" alt="Dr. Soma Mandal">
          </div>
          <span class="header-name">Dr. Soma Mandal</span>
        </a>
        <a href="/blog" class="header-back">← All Articles</a>
      </div>
      <img src="/assets/logos/logo-primary.png" alt="Dr. Soma Mandal Logo" style="max-height:36px;">
    </div>
  </header>

  <div id="article-hero" class="article-hero" style="display:none;">
    <img id="hero-img" src="" alt="">
  </div>

  <div id="loading" class="loading">Loading article…</div>

  <div id="article-wrapper" class="article-wrapper" style="display:none;">
    <p id="article-date" class="article-date"></p>
    <h1 id="article-title"></h1>
    <p class="article-meta">By Dr. Soma Mandal, MD</p>
    <div id="article-body" class="article-body"></div>
    <div id="share-bar" class="share-bar" style="display:none;">
      <span class="share-label">Share</span>
      <a id="share-x" class="share-btn" href="#" target="_blank" rel="noopener" aria-label="Share on X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a id="share-fb" class="share-btn" href="#" target="_blank" rel="noopener" aria-label="Share on Facebook">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </a>
      <a id="share-li" class="share-btn" href="#" target="_blank" rel="noopener" aria-label="Share on LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a id="share-email" class="share-btn" href="#" aria-label="Share via email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      </a>
    </div>
    <nav id="article-nav" class="article-nav"></nav>
  </div>

  <footer>
    <p>&copy; 2026 Dr. Soma Mandal, MD &nbsp;|&nbsp; <a href="/">somamandalmd.com</a></p>
  </footer>

  <script>
    (async function() {
      // Get slug from URL: /blog/slug or ?slug=slug
      const path = window.location.pathname; // e.g. /blog/hot-flashes
      const parts = path.split('/').filter(Boolean);
      let slug = parts[parts.length - 1];
      if (slug === 'article' || slug === 'blog') {
        slug = new URLSearchParams(window.location.search).get('slug');
      }

      if (!slug) { showError('No article specified.'); return; }

      let articles;
      try {
        const res = await fetch('/data/articles.json');
        articles = await res.json();
      } catch(e) {
        showError('Could not load articles.'); return;
      }

      const idx = articles.findIndex(a => a.slug === slug);
      if (idx === -1) { showError('Article not found.'); return; }

      const article = articles[idx];

      // Populate meta
      document.getElementById('page-title').textContent = article.title + ' \u2014 Dr. Soma Mandal, MD';
      document.getElementById('meta-description').content = article.excerpt;
      document.getElementById('og-title').content = article.title;
      document.getElementById('og-description').content = article.excerpt;
      document.getElementById('og-image').content = 'https://www.somamandalmd.com/' + article.image;
      document.getElementById('canonical').href = 'https://www.somamandalmd.com/blog/' + article.slug;

      // Hero image
      if (article.image) {
        const heroImg = document.getElementById('hero-img');
        heroImg.src = '/' + article.image;
        heroImg.alt = article.imageAlt || article.title;
        document.getElementById('article-hero').style.display = 'block';
      }

      // Date
      const dateEl = document.getElementById('article-date');
      const d = new Date(article.date + 'T12:00:00');
      dateEl.textContent = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      // Title + body
      document.getElementById('article-title').textContent = article.title;
      document.getElementById('article-body').innerHTML = article.content;

      // Prev / next navigation
      const nav = document.getElementById('article-nav');
      const newer = idx > 0 ? articles[idx - 1] : null;
      const older = idx < articles.length - 1 ? articles[idx + 1] : null;
      let navHTML = '<a href="/blog" class="all">All Articles</a>';
      if (newer) navHTML += `<a href="/blog/${newer.slug}" class="prev">${newer.title}</a>`;
      if (older) navHTML += `<a href="/blog/${older.slug}" class="next">${older.title}</a>`;
      nav.innerHTML = navHTML;

      // Share buttons
      var articleURL = 'https://www.somamandalmd.com/blog/' + article.slug;
      var shareText = article.title + ' — Dr. Soma Mandal, MD';
      document.getElementById('share-x').href = 'https://x.com/intent/tweet?url=' + encodeURIComponent(articleURL) + '&text=' + encodeURIComponent(shareText);
      document.getElementById('share-fb').href = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(articleURL);
      document.getElementById('share-li').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(articleURL);
      document.getElementById('share-email').href = 'mailto:?subject=' + encodeURIComponent(shareText) + '&body=' + encodeURIComponent('Check out this article: ' + articleURL);
      document.getElementById('share-bar').style.display = 'flex';

      // BlogPosting structured data
      var schema = {
        '@context': 'https://schema.org',
        '@type': 'BlogPosting',
        'headline': article.title,
        'description': article.excerpt,
        'image': 'https://www.somamandalmd.com/' + article.image,
        'datePublished': article.date,
        'dateModified': article.date,
        'url': articleURL,
        'author': {
          '@type': 'Person',
          'name': 'Dr. Soma Mandal',
          'jobTitle': 'Board-Certified Internist',
          'url': 'https://www.somamandalmd.com'
        },
        'publisher': {
          '@type': 'Organization',
          'name': 'Dr. Soma Mandal, MD',
          'url': 'https://www.somamandalmd.com',
          'logo': {
            '@type': 'ImageObject',
            'url': 'https://www.somamandalmd.com/assets/logos/logo-primary.png'
          }
        },
        'mainEntityOfPage': {
          '@type': 'WebPage',
          '@id': articleURL
        }
      };
      var scriptTag = document.createElement('script');
      scriptTag.type = 'application/ld+json';
      scriptTag.textContent = JSON.stringify(schema);
      document.head.appendChild(scriptTag);

      // Show article
      document.getElementById('loading').style.display = 'none';
      document.getElementById('article-wrapper').style.display = 'block';
    })();

    function showError(msg) {
      document.getElementById('loading').innerHTML =
        `<p style="color:#c00">${msg}</p><p style="margin-top:1rem"><a href="/blog" style="color:#E75294">← Back to all articles</a></p>`;
    }
  </script>
</body>
</html>
