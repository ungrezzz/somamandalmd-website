<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found &mdash; Dr. Soma Mandal, MD</title>
  <link rel="icon" type="image/png" sizes="96x96" href="assets/logos/favicon96x96.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #FFF5F7;
      color: #333333;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      max-height: 56px;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }
    .four-oh-four {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      color: #E75294;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      color: #333333;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #666;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #E75294;
      color: #fff;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover {
      background: #c9347a;
      transform: translateY(-1px);
    }
    .countdown {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #999;
    }
    .countdown span {
      color: #E75294;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <img src="/assets/logos/logo-primary.png" alt="Dr. Soma Mandal" class="logo">
  <div class="four-oh-four">404</div>
  <h1>This page took a midlife detour.</h1>
  <p>We couldn't find what you were looking for &mdash; but the good news is, Dr. Mandal's homepage has everything you need.</p>
  <a href="/" class="btn">Take Me Home</a>
  <p class="countdown">Redirecting in <span id="count">5</span> seconds…</p>

  <script>
    let seconds = 5;
    const el = document.getElementById('count');
    const timer = setInterval(function() {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = '/';
      }
    }, 1000);
  </script>
</body>
</html>
